<script>
fetch("ambil.php")
.then(res => res.json())
.then(data => {

    if (data.error) {
        document.body.innerHTML = data.error;
        return;
    }

    let v = data.voucher;

    let form = document.createElement("form");
    form.method = "POST";
    form.action = "http://IP-MIKROTIK/login";

    let u = document.createElement("input");
    u.name = "username";
    u.value = v;

    let p = document.createElement("input");
    p.name = "password";
    p.value = v;

    form.appendChild(u);
    form.appendChild(p);

    document.body.appendChild(form);
    form.submit();
});
</script>
